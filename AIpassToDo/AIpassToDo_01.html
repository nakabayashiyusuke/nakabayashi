<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI学習チェックリスト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>AI学習チェックリスト</h1>

    <h2>第1章 AI（人工知能）</h2>
    <div class="item-group">
        <div class="todo-item"><input type="checkbox" id="c1-1"><label for="c1-1">AIの定義（section 1）</label></div>
        <div class="todo-item"><input type="checkbox" id="c1-2"><label for="c1-2">AIに知能をもたらす仕組み（section 2）</label></div>
        <div class="todo-item"><input type="checkbox" id="c1-3"><label for="c1-3">AIの種類（section 3）</label></div>
        <div class="todo-item"><input type="checkbox" id="c1-4"><label for="c1-4">AIの歴史（section 4）</label></div>
        <div class="todo-item"><input type="checkbox" id="c1-5"><label for="c1-5">シンギュラリティ（section 5）</label></div>
    </div>

    <h2>第2章 生成AI（ジェネレーティブAI）</h2>
    <div class="item-group">
        <div class="todo-item"><input type="checkbox" id="c2-1"><label for="c2-1">生成AIの誕生まで（section 1）</label></div>
        <div class="todo-item"><input type="checkbox" id="c2-2"><label for="c2-2">ChatGPTの詳細・歴史・モデル（section 2）</label></div>
        <div class="todo-item"><input type="checkbox" id="c2-3"><label for="c2-3">その他の主要生成AI（Gemini/Claude/Copilot）（section 3）</label></div>
    </div>

    <h2>第3章 現在の生成AIの動向</h2>
    <div class="item-group">
        <div class="todo-item"><input type="checkbox" id="c3-1"><label for="c3-1">生成AIができることと主なサービス（section 1）</label></div>
        <div class="todo-item"><input type="checkbox" id="c3-2"><label for="c3-2">ディープフェイク（深層偽造）技術（section 2）</label></div>
        <div class="todo-item"><input type="checkbox" id="c3-3"><label for="c3-3">RAG（検索拡張生成）の仕組み・活用（section 3）</label></div>
        <div class="todo-item"><input type="checkbox" id="c3-4"><label for="c3-4">AIエージェントと外部連携（section 4）</label></div>
    </div>

    <h2>第4章 情報リテラシー・基本理念とAI社会原則</h2>
    <div class="item-group">
        <div class="todo-item"><input type="checkbox" id="c4-1"><label for="c4-1">インターネットリテラシー（section 1）</label></div>
        <div class="todo-item"><input type="checkbox" id="c4-2"><label for="c4-2">セキュリティとプライバシー（section 2）</label></div>
        <div class="todo-item"><input type="checkbox" id="c4-3"><label for="c4-3">個人情報保護の観点（section 3）</label></div>
        <div class="todo-item"><input type="checkbox" id="c4-4"><label for="c4-4">制作物に関わる権利・法律（知的財産権）（section 4）</label></div>
        <div class="todo-item"><input type="checkbox" id="c4-5"><label for="c4-5">AIを取り巻く理念・原則・ガイドライン（section 5）</label></div>
        <div class="todo-item"><input type="checkbox" id="c4-6"><label for="c4-6">AI新法の内容とリスク（section 6）</label></div>
    </div>

    <h2>第5章 テキスト生成AIのプロンプト制作と実例</h2>
    <div class="item-group">
        <div class="todo-item"><input type="checkbox" id="c5-1"><label for="c5-1">LM（言語モデル）とLLM、プロンプトエンジニアリング（section 1）</label></div>
        <div class="todo-item"><input type="checkbox" id="c5-2"><label for="c5-2">プロンプティングの基礎（Zero-Shot/Few-Shot）（section 2）</label></div>
        <div class="todo-item"><input type="checkbox" id="c5-3"><label for="c5-3">LLMプロンプティングの実踐（文章構成・要約等）（section 3）</label></div>
        <div class="todo-item"><input type="checkbox" id="c5-4"><label for="c5-4">ビジネス応用（メール・分析・タスク抽出等）（section 4）</label></div>
        <div class="todo-item"><input type="checkbox" id="c5-5"><label for="c5-5">テキスト生成AIの不得意なこと（section 5）</label></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
